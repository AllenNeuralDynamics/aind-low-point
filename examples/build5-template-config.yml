    loader: ccf_annotation_region
    loader_kwargs: { acronym: SUB }
    canonicalization_ref: "identity-lps"
    role: anatomy
    tags: [structure]
    scene_tags: [static, structure]
    metadata: { ccf_acronym: SUB, hemisphere: both }
