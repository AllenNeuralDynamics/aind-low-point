    collision: { group: static, mask: [] }
  - key: structure:ORB
    src: "${paths.ccf_annotation_path}"
    loader: ccf_annotation_region
    loader_kwargs: { acronym: ORB }
    canonicalization_ref: "identity-lps"
    role: anatomy
    tags: [structure]
    scene_tags: [static, structure]
