version: 1

# Template-space planning config (build5 MRI template).
# Brain regions are pulled from the brainglobe atlas already warped into
# template-LPS mm; hardware fixtures live in their native frames and are
# canonicalized per-asset. No chem-shift correction — geometry is
# authoritative; we are not estimating positions from an MRI scan.

paths:
  template_dir: "/mnt/Data/MRI/templates/AIND-MRI-T1-template-47-brain-mirror-2026-04-13"
  atlas_dir: "${.template_dir}/brainglobe_meshes_in_build5"
  hardware_dir: "/home/galen.lynch/Downloads"
  probe_models_dir: "/mnt/vast/scratch/ephys/persist/data/MRI/HeadframeModels"

# (no `imaging:` block — chem-shift correction is N/A in template space)

canonicalizations:
  identity-lps:
    source_space: "LPS"
    scale_to_mm: 1.0
  obj-asr:
    source_space: "ASR"
  obj-als:
    source_space: "ALS"
  # Meter-unit variants: Onshape STEP→OBJ exports default to metres, so
  # most hardware OBJs in /Downloads need scale_to_mm: 1000. The implant
  # mesh happens to already be in mm — keep it on plain "obj-asr".
  obj-asr-meters:
    source_space: "ASR"
    scale_to_mm: 1000.0
  obj-als-meters:
    source_space: "ALS"
    scale_to_mm: 1000.0
  identity-lps-meters:
    source_space: "LPS"
    scale_to_mm: 1000.0
  probe-mesh:
    source_space: "LSA"

materials:
  structure:
    color: "#88CCFF"
    opacity: 0.12
  structure_target:
    color: "#FFCC88"
    opacity: 0.6
    point_size: 6.0
  fixture:
    color: "#E7DDFF"
    opacity: 0.7

asset_templates:
  hardware:
    kind: mesh
    role: geometry
    loader: trimesh
    material_ref: fixture
    caps: [renderable, collidable]
    collision:
      group: fixture
      mask: [probe]
  probe:
    kind: mesh
    role: geometry
    loader: trimesh
    canonicalization_ref: "probe-mesh"
    material: { color: "#66DD66", opacity: 1.0 }
    caps: [renderable, movable, collidable, selectable, savable]
    collision:
      group: probe
      mask: [fixture, probe]

target_templates:
  structure:
    reducer: mesh_center_mass
    material_ref: structure_target
    tags: [structure, target]
    collision:
      group: static
      mask: []

assets:
  # Whole-brain outline (skull-stripped MRI mask, already in template-LPS).
  # Rendered very transparent for spatial context only — non-collidable.
  - key: brain
    src: "${paths.template_dir}/CK-GL-T1-template-100-mask.nii.gz"
    loader: sitk_volume
    role: anatomy
    canonicalization_ref: "identity-lps"
    material: { color: "#FFFFFF", opacity: 0.05 }
    caps: [renderable]
    scene_tags: [static, brain]

  # CCF region meshes from the brainglobe build5 directory. Already in
  # template-LPS mm so canonicalization is identity. Resolved by acronym
  # via the bundled CCF ontology.
  - atlas_dir: "${paths.atlas_dir}"
    acronyms: [ACB, GPe, SNr, VTA, SI, PL, ORB, SUB, BLA, MD, PVT, LHA]
    key_prefix: "structure"
    canonicalization_ref: "identity-lps"
    material_ref: structure   # provides opacity etc.; color overridden per region
    use_ccf_color: true       # each region rendered in its bundled CCF color
    role: anatomy
    tags: [structure]
    scene_tags: [static, structure]
    collision:
      group: static
      mask: []

  # Hardware fixtures — each in its own native frame.
  - key: implant
    src: "${paths.hardware_dir}/0274-P-001.obj"
    templates: [hardware]
    canonicalization_ref: "obj-asr"
    scene_tags: [fixture, implant]

  - key: well
    src: "${paths.hardware_dir}/0160-075-01-_DHC HF Well/0160-075-01-_DHC HF Well.obj"
    templates: [hardware]
    canonicalization_ref: "obj-als-meters"
    scene_tags: [fixture, well]

  - key: probe-guard
    src: "${paths.hardware_dir}/0304-P-004-_DHC HF Probeguard/0304-P-004-_DHC HF Probeguard.obj"
    templates: [hardware]
    canonicalization_ref: "identity-lps-meters"
    scene_tags: [fixture, probe-guard]

  - key: headframe
    src: "${paths.hardware_dir}/0160-100-57-_Dual Hemisphere Headframe V2/0160-100-57-_Dual Hemisphere Headframe V2.obj"
    templates: [hardware]
    canonicalization_ref: "obj-als-meters"
    scene_tags: [static, headframe]

  # Probe meshes (Newscale, LSA convention, from AIND's shared HeadframeModels).
  - key: probe:2.1
    src: "${paths.probe_models_dir}/dovetailtweezer_oneShank_centered_corrected.obj"
    templates: [probe]

  - key: probe:2.4
    src: "${paths.probe_models_dir}/dovetailwtweezer_fourShank_centeredOnShank0.obj"
    templates: [probe]

targets:
  # Per-hemisphere centroids of each CCF region — bilateral structures
  # otherwise collapse onto the midline. The hemisphere_center_mass
  # reducer slices the mesh at x=0 (LPS-L axis: positive = animal's
  # left) and returns the volumetric centre of the kept half.
  - derive_from: &ccf_structure_keys
      - "structure:ACB"
      - "structure:GPe"
      - "structure:SNr"
      - "structure:VTA"
      - "structure:SI"
      - "structure:PL"
      - "structure:ORB"
      - "structure:SUB"
      - "structure:BLA"
      - "structure:MD"
      - "structure:PVT"
      - "structure:LHA"
    key_prefix: "target:L:"
    reducer: hemisphere_center_mass
    reducer_kwargs: { hemisphere: left }
    templates: [structure]

  - derive_from: *ccf_structure_keys
    key_prefix: "target:R:"
    reducer: hemisphere_center_mass
    reducer_kwargs: { hemisphere: right }
    templates: [structure]

scene:
  nodes: []   # all auto-scened from auto_scene: true on assets / probes

plan:
  arcs:
    a: 0.0
    b: 0.0

  # Four NP 2.0 four-shank probes per insertion. Three are dedicated to
  # specific regions; the fourth is flex (defaults to BLA, retarget in UI).
  probes:
    P1_ACB:
      kind: "2.4"
      arc: a
      spin: 0
      slider_ml: -10
      target:
        kind: catalog
        key: "target:L:ACB"
    P2_SNr_VTA:           # alternates between SNr and VTA — flip in UI
      kind: "2.4"
      arc: a
      spin: 0
      slider_ml: 10
      target:
        kind: catalog
        key: "target:L:SNr"
    P3_GPe:
      kind: "2.4"
      arc: b
      spin: 0
      slider_ml: -10
      target:
        kind: catalog
        key: "target:L:GPe"
    P4_flex:              # any of the 12 regions; default BLA
      kind: "2.4"
      arc: b
      spin: 0
      slider_ml: 10
      target:
        kind: catalog
        key: "target:L:BLA"

