  # Hardware fixtures — each in its own native frame.
  - key: implant
    src: "${paths.hardware_dir}/0274-P-001.obj"
    templates: [hardware]
    canonicalization_ref: "obj-asr"
    scene_tags: [fixture, implant]

  - key: well
    src: "${paths.hardware_dir}/0160-075-01-_DHC HF Well.obj"
    templates: [hardware]
    canonicalization_ref: "obj-als-meters"
    scene_tags: [fixture, well]

  - key: probe-guard
    src: "${paths.hardware_dir}/0304-P-004-_DHC HF Probeguard.obj"
    templates: [hardware]
    canonicalization_ref: "identity-lps-meters"
    scene_tags: [fixture, probe-guard]

  - key: headframe
    src: "${paths.hardware_dir}/0160-100-57-_Dual Hemisphere Headframe V2.obj"
    templates: [hardware]
    canonicalization_ref: "obj-als-meters"
    scene_tags: [static, headframe]

  # Probe meshes (Newscale, LSA convention, from AIND's shared HeadframeModels).
  - key: probe:2.1
    src: "${paths.probe_models_dir}/dovetailtweezer_oneShank_centered_corrected.obj"
    templates: [probe]

  - key: probe:2.4
    src: "${paths.probe_models_dir}/dovetailwtweezer_fourShank_centeredOnShank0.obj"
    templates: [probe]

  - key: probe:quadbase-alpha
    src: "${paths.probe_models_dir}/Quadbase_customHolder_centeredOnShank0_moreacuratewidth.obj"
    templates: [probe]

  - key: probe:quadbase-dovetail
    src: "${paths.probe_models_dir}/Quadbase_dovetailHolder_centeredOnShank0_moreacuratewidth.obj"
    templates: [probe]

targets:
  # Per-hemisphere region voxel centroids by label (exact, robust to the
  # CCF→template warp). The ``structure:*`` glob resolves against the structure
  # assets above, so that asset list stays the single source of truth — to add
  # or remove a region, edit one place. ``expand`` wires each target to
  # ``ccf_region_voxel_points`` + ``points_mean`` from the source asset and the
  # ``hemisphere``.
  - derive_from: "structure:*"
    key_prefix: "target:L:"
    hemisphere: left
    reducer: points_mean
    canonicalization_ref: "identity-lps"
    templates: [structure]

  - derive_from: "structure:*"
    key_prefix: "target:R:"
    hemisphere: right
    reducer: points_mean
    canonicalization_ref: "identity-lps"
    templates: [structure]

scene:
  nodes: []   # all auto-scened from auto_scene: true on assets / probes

plan:
  arcs:
    # Hardware constraint: arcs must be ≥16° apart in AP. The default
    # spread keeps the starting plan kinematically valid; retune in the
    # GUI as needed.
    a: 20.0
    b: -9.0
    c: -25.0

  # Six-probe insertion mixing quadbase-alpha (1×), 4-shank NP 2.0 (4×),
  # and single-shank NP 2.0 / fiber (1×). Geometry pulled from
  # build5-template-config.plan.yml. Probe-name suffixes are user
  # labels — the catalog key on each ``target:`` is what actually
  # drives placement.
  probes:
    P1_ACB:
      kind: quadbase-alpha
      arc: b
      slider_ml: 25.0
      spin: 180.0
      past_target_mm: -0.7
      offsets_RA: [0.15, -0.1]
      target:
        kind: catalog
        key: "target:L:ACB"
    P2_SNr_VTA:           # alternates between SNr and VTA — flip in UI
      kind: "2.4"
      arc: c
      slider_ml: -14.0
      spin: 90.0
      past_target_mm: 0.3
      offsets_RA: [0.55, 0.25]
      target:
        kind: catalog
        key: "target:L:SNr"
    P3_GPe:               # labelled GPe but actually targets SI
      kind: "2.4"
      arc: c
      slider_ml: 9.5
      spin: 0.0
      past_target_mm: -0.1
      offsets_RA: [-0.25, -1.05]
      target:
        kind: catalog
        key: "target:L:SI"
    P4_flex:              # any of the 13 regions; default PL
      kind: "2.4"
      arc: b
      slider_ml: -22.0
      spin: 0.0
      past_target_mm: 0.0
      offsets_RA: [-0.1, -0.1]
      target:
        kind: catalog
        key: "target:L:PL"
    P5_flex:              # second flex probe; default ACA
      kind: "2.4"
      arc: b
      slider_ml: -6.0
      spin: 0.0
      past_target_mm: 0.0
      offsets_RA: [-0.35, -0.05]
      target:
        kind: catalog
        key: "target:L:ACA"
    P6_fiber:             # single-shank fiber, deep ACB
      kind: "2.1"
      arc: c
      slider_ml: -31.0
      spin: 0.0
      past_target_mm: -2.4
      offsets_RA: [0.25, -0.4]
      target:
        kind: catalog
        key: "target:L:ACB"

