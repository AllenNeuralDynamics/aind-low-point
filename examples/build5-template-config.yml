version: 1

# Template-space planning config (build5 MRI template).
# Brain regions are pulled from the brainglobe atlas already warped into
# template-LPS mm; hardware fixtures live in their native frames and are
# canonicalized per-asset. No chem-shift correction — geometry is
# authoritative; we are not estimating positions from an MRI scan.

paths:
  template_dir: "/mnt/Data/MRI/templates/AIND-MRI-T1-template-47-brain-mirror-2026-04-13"
  # Lateralized CCF annotation warped into template-LPS (left = negated label
  # id, IBL convention). Structures are meshed from this volume and per-hemisphere
  # targets are its region voxel centroids — the same voxel-label mechanism as the
  # subject configs.
  ccf_annotation_path: "${.template_dir}/template_to_ccf/CCF_annotation_100_lateralized_in_template.nii.gz
  probe_models_dir: "/mnt/vast/scratch/ephys/persist/data/MRI/HeadframeModels"
  hardware_dir: "${.probe_models_dir}"

# (no `imaging:` block — chem-shift correction is N/A in template space)

canonicalizations:
  identity-lps:
    source_space: "LPS"
    scale_to_mm: 1.0
  obj-asr:
    source_space: "ASR"
  obj-als:
    source_space: "ALS"
  # Meter-unit variants: Onshape STEP→OBJ exports default to metres, so
  # most hardware OBJs in /Downloads need scale_to_mm: 1000. The implant
  # mesh happens to already be in mm — keep it on plain "obj-asr".
  obj-asr-meters:
    source_space: "ASR"
    scale_to_mm: 1000.0
  obj-als-meters:
    source_space: "ALS"
    scale_to_mm: 1000.0
  identity-lps-meters:
    source_space: "LPS"
    scale_to_mm: 1000.0
  probe-mesh:
    source_space: "LSA"

materials:
  structure:
    color: "#88CCFF"
    opacity: 0.12
  structure_target:
    color: "#FFCC88"
    opacity: 0.6
    point_size: 6.0
  fixture:
    color: "#E7DDFF"
    opacity: 0.7

asset_templates:
  hardware:
    kind: mesh
    role: geometry
    loader: trimesh
    material_ref: fixture
    caps: [renderable, collidable]
    collision:
      group: fixture
      mask: [probe]
  probe:
    kind: mesh
    role: geometry
    loader: trimesh
    canonicalization_ref: "probe-mesh"
    material: { color: "#66DD66", opacity: 1.0 }
    caps: [renderable, movable, collidable, selectable, savable]
    collision:
      group: probe
      mask: [fixture, probe]

target_templates:
  structure:
    reducer: mesh_center_mass
    material_ref: structure_target
    tags: [structure, target]
    collision:
      group: static
      mask: []

assets:
  # Whole-brain outline (skull-stripped MRI mask, already in template-LPS).
  # Rendered very transparent for spatial context only — non-collidable.
  - key: brain
    src: "${paths.template_dir}/CK-GL-T1-template-100-mask.nii.gz"
    loader: sitk_volume
    role: anatomy
    canonicalization_ref: "identity-lps"
    material: { color: "#FFFFFF", opacity: 0.05 }
    caps: [renderable]
    scene_tags: [static, brain]

  # CCF regions meshed from the lateralized annotation volume (template-LPS mm,
  # so canonicalization is identity). Selecting by label — rather than loading a
  # separate per-region brainglobe mesh — keeps rendering and per-hemisphere
  # target selection on one source of truth. Colors are the bundled CCF colors.
  - key: structure:ACB
    src: "${paths.ccf_annotation_path}"
    loader: ccf_annotation_region
    loader_kwargs: { acronym: ACB }
    canonicalization_ref: "identity-lps"
    role: anatomy
    tags: [structure]
    scene_tags: [static, structure]
    metadata: { ccf_acronym: ACB, hemisphere: both }
    material: { color: "#80CDF8", opacity: 0.12 }
    collision: { group: static, mask: [] }
  - key: structure:GPe
    src: "${paths.ccf_annotation_path}"
    loader: ccf_annotation_region
    loader_kwargs: { acronym: GPe }
    canonicalization_ref: "identity-lps"
    role: anatomy
    tags: [structure]
    scene_tags: [static, structure]
